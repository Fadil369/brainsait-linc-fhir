# Cloudflare R2 Media Storage Worker
name = "brainsait-r2-media"
main = "media-worker.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
VERSION = "2.1.0"

# R2 bucket binding
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "brainsait-media"

# Routes for storage API
[env.production]
name = "brainsait-r2-media-production"
routes = [
  { pattern = "media.brainsait.org/*", zone_name = "brainsait.org" }
]

# Custom domain
# [[domains]]
#   hostname = "media.brainsait.org"
#   zone_name = "brainsait.org"