# Unified Gateway - BotFather v2.1
name = "brainsait-unified-gateway"
main = "unified-gateway.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
VERSION = "2.1.0"

# KV for caching and rate limiting
[[kv_namespaces]]
binding = "KV"
id = "brainsait-feature-flags"

# R2 buckets
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "brainsait-media"

# Environment-specific URLs (secrets in production)
[dev]
port = 8787

[env.production]
name = "brainsait-unified-gateway-production"
routes = [
  { pattern = "api.brainsait.org/*", zone_name = "brainsait.org" }
]

# Secrets to set:
# wrangler secret put FHIR_API_URL
# wrangler secret put HEALTH_API_URL  
# wrangler secret put AGENT_API_URL
# wrangler secret put BASMA_API_URL
# wrangler secret put NPHIES_API_URL
# wrangler secret put AUTH_API_URL
# wrangler secret put COMMS_API_URL

# Custom domains
# [[domains]]
#   hostname = "api.brainsait.org"
#   zone_name = "brainsait.org"