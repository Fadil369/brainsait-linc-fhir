name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: preview
        type: choice
        options: [preview, production]

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build-size: ${{ steps.size.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore Vite build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx,css}') }}
          restore-keys: vite-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Report build size
        id: size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "### Build output" >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/* | awk '{print "| `"$2"` | "$1" |"}' >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $SIZE**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1
          if-no-files-found: error

  deploy-preview:
    name: Deploy — Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=brainsait-linc-fhir
            --branch=${{ github.head_ref }}
            --commit-hash=${{ github.sha }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: steps.deploy.outputs.deployment-url != ''
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const sha7 = '${{ github.sha }}'.substring(0, 7);
            const body = [
              '## ☁️ Cloudflare Pages — Preview Deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | [${url}](${url}) |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              `| **Commit** | \`${sha7}\` |`,
              `| **Build size** | ${{ needs.build.outputs.build-size }} |`,
              '',
              `> Updated at ${new Date().toUTCString()}`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Pages — Preview Deployment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: build
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://brainsait-linc-fhir.pages.dev
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=brainsait-linc-fhir
            --branch=main
            --commit-hash=${{ github.sha }}

      - name: Deployment summary
        run: |
          echo "### ✅ Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | https://brainsait-linc-fhir.pages.dev |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build size** | ${{ needs.build.outputs.build-size }} |" >> "$GITHUB_STEP_SUMMARY"
